name: Release

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version increment type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
          - prerelease
      preid:
        description: 'Pre-release identifier to use when version_type is prerelease'
        required: false
        default: 'rc'
        type: choice
        options:
          - rc
          - beta
          - alpha
      dry_run:
        description: 'Dry run (skip publish, commits, tags)'
        required: false
        default: false
        type: boolean

  workflow_call:
    inputs:
      version_type:
        description: 'Version increment type (patch|minor|major|prerelease)'
        required: true
        type: string
        default: 'patch'
      preid:
        description: 'Pre-release identifier to use when version_type is prerelease'
        required: false
        type: string
        default: 'rc'
      dry_run:
        description: 'Dry run (skip upload)'
        required: false
        type: boolean
        default: false
      spec_url:
        description: 'OpenAPI spec URL to baseline (optional)'
        required: false
        type: string
        default: 'https://api.amigo.ai/v1/openapi.json'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Reuse the existing test workflow
  test:
    uses: ./.github/workflows/test.yml
    with:
      skip_codecov: true
    secrets: inherit

  release:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get current version
        id: current_version
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT_VERSION"

      - name: Generate models
        run: |
          echo "🔄 Generating models from API spec..."
          node scripts/gen.mjs
          echo "✅ Models generated successfully"

      - name: Fetch OpenAPI spec
        id: fetch_spec
        run: |
          SPEC_URL="${{ inputs.spec_url }}"
          if [ -z "$SPEC_URL" ]; then
            SPEC_URL="https://api.amigo.ai/v1/openapi.json"
          fi
          echo "spec_url=$SPEC_URL" >> $GITHUB_OUTPUT
          curl -fSL -o openapi-new.json "$SPEC_URL"
          mkdir -p specs
          cp openapi-new.json specs/openapi-baseline.json

      - name: Increment version
        id: new_version
        run: |
          VERSION_TYPE="${{ inputs.version_type }}"
          PREID="${{ inputs.preid }}"
          if [ "$VERSION_TYPE" = "prerelease" ]; then
            VERSION_CMD=(npm version prerelease --preid "$PREID" --no-git-tag-version)
            echo "🔄 Incrementing prerelease version with preid '$PREID'..."
          else
            VERSION_CMD=(npm version "$VERSION_TYPE" --no-git-tag-version)
            echo "🔄 Incrementing $VERSION_TYPE version..."
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            VERSION_CMD+=(--dry-run)
            NEW_VERSION=$("${VERSION_CMD[@]}")
            NEW_VERSION=${NEW_VERSION#v}
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "✅ (dry-run) Version would be: ${{ steps.current_version.outputs.version }} → $NEW_VERSION"
          else
            "${VERSION_CMD[@]}"
            NEW_VERSION=$(node -p "require('./package.json').version")
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "✅ Version updated: ${{ steps.current_version.outputs.version }} → $NEW_VERSION"
          fi

      - name: Resolve npm dist-tag
        id: npm_tag
        run: |
          if [[ "${{ steps.new_version.outputs.version }}" == *-* ]]; then
            DIST_TAG="${{ inputs.preid }}"
          else
            DIST_TAG="latest"
          fi
          echo "tag=$DIST_TAG" >> $GITHUB_OUTPUT
          echo "Using npm dist-tag: $DIST_TAG"

      - name: Update CHANGELOG.md
        if: ${{ !inputs.dry_run }}
        run: |
          NEW_VERSION="${{ steps.new_version.outputs.version }}"
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            ENTRY=$(bash scripts/generate-changelog.sh --from "$PREV_TAG" --version "$NEW_VERSION")
          else
            ENTRY=$(bash scripts/generate-changelog.sh --version "$NEW_VERSION")
          fi
          if [ -f CHANGELOG.md ]; then
            # Insert after the first line (title)
            { head -1 CHANGELOG.md; echo ""; echo "$ENTRY"; tail -n +2 CHANGELOG.md; } > CHANGELOG.tmp
            mv CHANGELOG.tmp CHANGELOG.md
          else
            { echo "# Changelog"; echo ""; echo "$ENTRY"; } > CHANGELOG.md
          fi
          git add CHANGELOG.md

      - name: Build release notes
        if: ${{ !inputs.dry_run }}
        run: |
          # Capture notes before the release commit so the metadata commit is not listed as a product change.
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          NEW_TAG="v${{ steps.new_version.outputs.version }}"

          if [ -z "$PREV_TAG" ]; then
            echo "⚠️ No previous tag found, listing all commits"
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)  # First commit
          fi
          echo "📋 Generating release notes: ${PREV_TAG}..HEAD → ${NEW_TAG}"

          {
            echo "## What's Changed in ${NEW_TAG}"
            echo ""

            # Features (feat: or feat(scope):)
            FEATS=$(git log --pretty=format:'- %s (%h)' "${PREV_TAG}..HEAD" | grep -iE '^- feat(\(.*\))?:' | sed -E 's/^- feat(\([^)]*\))?:[[:space:]]*/- /' || true)
            if [ -n "$FEATS" ]; then
              echo "### Features"
              echo "$FEATS"
              echo ""
            fi

            # Bug fixes (fix: or fix(scope):)
            FIXES=$(git log --pretty=format:'- %s (%h)' "${PREV_TAG}..HEAD" | grep -iE '^- fix(\(.*\))?:' | sed -E 's/^- fix(\([^)]*\))?:[[:space:]]*/- /' || true)
            if [ -n "$FIXES" ]; then
              echo "### Bug Fixes"
              echo "$FIXES"
              echo ""
            fi

            # Other changes (excluding chore, docs, refactor, test, ci, build, style)
            OTHER=$(git log --pretty=format:'- %s (%h)' "${PREV_TAG}..HEAD" | grep -ivE '^- (feat|fix|chore|docs|refactor|test|ci|build|style)(\(.*\))?:' || true)
            if [ -n "$OTHER" ]; then
              echo "### Other Changes"
              echo "$OTHER"
              echo ""
            fi

            # If no categorized commits found, list all
            if [ -z "$FEATS" ] && [ -z "$FIXES" ] && [ -z "$OTHER" ]; then
              echo "### Changes"
              git log --pretty=format:'- %s (%h)' "${PREV_TAG}..HEAD" || echo "- (no commits found)"
              echo ""
            fi

            echo "---"
            echo ""
            echo "**Full Changelog**: https://github.com/${GITHUB_REPOSITORY}/compare/${PREV_TAG}...${NEW_TAG}"
            echo ""
            echo "### Installation"
            echo "\`\`\`bash"
            echo "npm install @amigo-ai/sdk@${{ steps.new_version.outputs.version }}"
            echo "\`\`\`"
          } > release-notes.md

          # Convert PR references (#123) to clickable links
          # Use @ as delimiter since # appears in the pattern
          sed -i -E "s@\(#([0-9]+)\)@([#\1](https://github.com/${GITHUB_REPOSITORY}/pull/\1))@g" release-notes.md

          echo "📝 Generated release notes:"
          cat release-notes.md

      - name: Build package
        run: |
          echo "🔄 Building package..."
          rm -rf dist/
          npm run build
          echo "✅ Package built successfully"
          ls -la dist/

      - name: Pack tarball
        id: pack
        run: |
          echo "🔄 Creating npm pack tarball..."
          FILE=$(npm pack --silent)
          echo "file=$FILE" >> $GITHUB_OUTPUT
          echo "✅ Tarball created: $FILE"
          ls -la "$FILE"

      - name: Publish to npm
        if: ${{ !inputs.dry_run }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "🔄 Publishing to npm..."
          FILE="${{ steps.pack.outputs.file }}"
          npm publish "$FILE" --provenance --access public --tag "${{ steps.npm_tag.outputs.tag }}"
          echo "✅ Package published to npm with dist-tag '${{ steps.npm_tag.outputs.tag }}'"

      - name: Commit version bump
        if: ${{ !inputs.dry_run }}
        run: |
          git add package.json package-lock.json specs/openapi-baseline.json CHANGELOG.md || true
          git commit -m "Bump version to ${{ steps.new_version.outputs.version }}"
          git push origin HEAD

      - name: Create and push tag
        if: ${{ !inputs.dry_run }}
        run: |
          git tag -a "v${{ steps.new_version.outputs.version }}" -m "Release v${{ steps.new_version.outputs.version }}"
          git push origin "v${{ steps.new_version.outputs.version }}"

      - name: Create GitHub Release
        if: ${{ !inputs.dry_run }}
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          tag_name: 'v${{ steps.new_version.outputs.version }}'
          name: 'Release v${{ steps.new_version.outputs.version }}'
          body_path: release-notes.md
          draft: false
          files: |
            ${{ steps.pack.outputs.file }}

      - name: Cleanup temp files
        if: always()
        run: |
          rm -f openapi-new.json || true

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-${{ steps.new_version.outputs.version }}
          path: |
            dist/
            ${{ steps.pack.outputs.file }}
          retention-days: 30

      - name: Release Summary
        run: |
          echo "## 🎉 Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Version: ${{ steps.new_version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Previous: ${{ steps.current_version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Dry Run: ${{ inputs.dry_run }}" >> $GITHUB_STEP_SUMMARY
          echo "- Published: ${{ inputs.dry_run && 'skipped' || 'npm' }}" >> $GITHUB_STEP_SUMMARY
